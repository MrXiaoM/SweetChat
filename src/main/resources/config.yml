# 重定向配置文件夹位置
folder:
  chat: './chat'

# 聊天监听器设置
listener:
  # 是否启用聊天监听器，关闭将不会处理玩家聊天，失去本插件大部分功能
  enable: true
  # 事件监听优先级，服务端会按以下顺序执行事件监听处理器
  # LOWEST -> LOW -> NORMAL -> HIGH -> HIGHEST
  # 作为聊天插件，比较建议使用 HIGHEST 优先级
  priority: HIGHEST
  # 监听什么事件来处理聊天，不支持时将会自动回退
  # BUKKIT - Bukkit 接口的聊天事件，处理时机较往前，但会与部分使用 Paper 聊天事件的插件冲突 (org.bukkit.event.player.AsyncPlayerChatEvent)
  # PAPER - Paper 接口的现代聊天事件，但处理时机较往后 (io.papermc.paper.event.player.AsyncChatEvent)
  event: PAPER

# 功能模块配置管理
modules:
  # 是否启用消息过滤器功能
  # 关闭此选项，会影响其它附属插件向 SweetChat 注册的过滤器
  filter: true
  # 是否启用条件变量功能
  # 关闭此选项，不会加载配置文件，会影响在 PAPI 变量中使用条件变量
  placeholders: true
  # 是否启用消息替换功能
  # 关闭此选项，会影响其它附属插件向 SweetChat 注册的替换器
  replacements: true
  # 是否启用消息样式功能
  # 关闭此选项，会影响其它附属插件向 SweetChat 注册的样式
  styles: true

# 与其它插件联动支持
interaction:
  CMI:
    # 发送聊天后，显示聊天气泡
    chat-bubble: true

# 聊天模式设置
chat-mode:
  # 玩家直接发送聊天消息的默认聊天模式
  # GLOBAL - 全局广播（喊话）
  # LOCAL - 附近聊天
  default-mode: GLOBAL
  # 添加什么前缀可快捷切换聊天模式
  # 使用 | 来分割多个聊天模式，用于忽略与默认模式匹配的模式
  switch-mode-prefix:
    '!': GLOBAL|LOCAL
  # 当没有任何聊天格式匹配时，是否取消事件禁用原版聊天
  # 并且执行指定操作，用于发送提示
  cancel-event-when-no-format-match:
    enable: true
    actions:
      - '[message]&e当前不允许聊天'
  # 全局广播模式设置
  global:
    # 全局广播需求条件，留空则无需条件，例如 '%vault_eco_balance% >= 50'
    requirement: ''
    # 发送成功执行命令，例如 '[console]money take %player_name% 50'
    success-actions: []
    # 不满足条件时执行命令，例如 '[message]&e你没有足够的金币用于喊话'
    deny-actions: []
    # 使用什么聊天格式
    formats:
      - 'default'
      - 'global/*'
  # 附近聊天模式设置
  local:
    # 周围多少格内的玩家可以看到聊天
    radius: 64
    # 使用什么聊天格式
    formats:
      - 'local/*'

mute:
  # 使用什么事件来处理禁言
  event: BUKKIT
  priority: HIGH
  time-format:
    duration:
      delimiter: ''
      days: 天
      day: 天
      hours: 时
      hour: 时
      minutes: 分
      minute: 分
      seconds: 秒
      second: 秒
    end-time: 'yyyy-MM-dd HH:mm:ss'
  placeholders:
    muted-timed: '禁言中 %duration%'
    muted-infinite: '永久禁言中'
    not-muted: '未禁言'

# 跨服广播设置
cross-server:
  # 消息广播模式
  # NONE - 不广播消息
  # BUNGEE_CORD - 通过 BungeeCord 消息通道广播消息
  # DATABASE - 通过数据库轮询广播消息
  mode: NONE
  # 当前子服所在的跨服分组
  group: default
